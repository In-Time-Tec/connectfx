id: no-hand-rolled-cli-argv
language: TypeScript
severity: error
message: CLI and script surfaces must use effect/unstable/cli instead of hand-rolled argv parsing.
rule:
  any:
    - pattern: process.argv
    - pattern: Bun.argv
    - pattern: Deno.args
    - pattern: parseArgs($$$ARGS)
files:
  - "**/*.ts"
  - "**/*.tsx"
ignores:
  - "**/dist/**"
  - "**/coverage/**"
  - "node_modules/**"
